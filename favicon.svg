<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#2255d8"/>
  <!-- Book pages -->
  <rect x="6" y="8" width="13" height="17" rx="2" fill="white"/>
  <rect x="8" y="10" width="9" height="1.8" rx="0.9" fill="#2255d8" opacity="0.7"/>
  <rect x="8" y="13" width="9" height="1.8" rx="0.9" fill="#2255d8" opacity="0.5"/>
  <rect x="8" y="16" width="6" height="1.8" rx="0.9" fill="#2255d8" opacity="0.4"/>
  <!-- Book spine -->
  <rect x="19" y="9" width="2.5" height="14" rx="1.25" fill="rgba(255,255,255,0.5)"/>
  <!-- Second book (back) -->
  <rect x="22" y="10" width="4" height="13" rx="1.5" fill="#60a5fa"/>
  <rect x="22" y="10" width="4" height="3" rx="1" fill="#93c5fd"/>
</svg>
